spring:
  application:
    name: blog
  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:blogdb
    driverClassName: org.h2.Driver
    username: sa
    password: password

  sql:
    init:
      mode: always
    jpa:
      defer:
        datasource-initialization: true
      hibernate:
        ddl-auto: update

blog:
  admin:
    secret-key: ${BLOG_ADMIN_PASSWORD:DonMindfulness2026@Default}
